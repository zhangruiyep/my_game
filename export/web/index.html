<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FE Tactics</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
body { display: flex; justify-content: center; align-items: center; }
canvas { display: block; image-rendering: auto; }

#loading {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  background: #1a1a2e; z-index: 10; transition: opacity 0.5s;
}
#loading.hidden { opacity: 0; pointer-events: none; }

#loading h1 { color: #ccc; font-family: sans-serif; margin-bottom: 10px; font-size: 28px; }
#loading p { color: #888; font-family: sans-serif; margin-bottom: 20px; font-size: 14px; }

#progress-bar {
  width: 300px; height: 12px; background: #2a2a3e; border-radius: 6px; overflow: hidden;
}
#progress-fill {
  width: 0%; height: 100%; background: linear-gradient(90deg, #3355cc, #5588ee);
  border-radius: 6px; transition: width 0.3s;
}
#progress-text { color: #aaa; font-family: sans-serif; margin-top: 8px; font-size: 12px; }
</style>
</head>
<body>
<div id="loading">
  <h1>⚔️ FE Tactics</h1>
  <p>火焰纹章风格战棋游戏</p>
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="progress-text">加载中...</div>
</div>

<script>
var GODOT_CONFIG = {
  "args": [],
  "canvasResizePolicy": 2,
  "executable": "index",
  "experimentalVK": false,
  "fileSizes": { "index.pck": 0, "index.wasm": 0 },
  "focusCanvas": true
};

document.addEventListener('DOMContentLoaded', function() {
  var canvas = document.getElementById('canvas');
  var loading = document.getElementById('loading');
  var progressFill = document.getElementById('progress-fill');
  var progressText = document.getElementById('progress-text');

  if (!canvas) {
    canvas = document.createElement('canvas');
    canvas.id = 'canvas';
    document.body.appendChild(canvas);
  }

  var engine = new Engine(GODOT_CONFIG);

  engine.setProgressFunc(function(current, total) {
    if (total > 0) {
      var pct = Math.round(current / total * 100);
      progressFill.style.width = pct + '%';
      progressText.textContent = 'Loading... ' + pct + '%';
    }
  });

  engine.startGame().then(function() {
    loading.classList.add('hidden');
    setTimeout(function() { loading.remove(); }, 600);
  }).catch(function(err) {
    progressText.textContent = '加载失败: ' + err;
    progressText.style.color = '#f55';
  });

  function resizeCanvas() {
    var scale = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
    canvas.style.width = (1280 * scale) + 'px';
    canvas.style.height = (720 * scale) + 'px';
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
});
</script>
</body>
</html>
